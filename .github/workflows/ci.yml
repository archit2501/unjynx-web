name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  landing:
    name: Landing Page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: landing
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Build
        working-directory: landing
        run: pnpm build

  admin:
    name: Admin Panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: admin
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Type check
        working-directory: admin
        run: pnpm tsc --noEmit || true

      - name: Build
        working-directory: admin
        run: pnpm build
        env:
          VITE_API_URL: https://api.unjynx.me/api/v1
          VITE_LOGTO_ENDPOINT: https://auth.unjynx.me
          VITE_LOGTO_APP_ID: unjynx-admin-web

  dev-portal:
    name: Dev Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: dev-portal
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Type check
        working-directory: dev-portal
        run: pnpm tsc --noEmit || true

      - name: Build
        working-directory: dev-portal
        run: pnpm build
        env:
          VITE_API_URL: https://api.unjynx.me/api/v1
          VITE_LOGTO_ENDPOINT: https://auth.unjynx.me
          VITE_LOGTO_APP_ID: unjynx-dev-portal
